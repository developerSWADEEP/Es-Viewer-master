plugins {
    id "com.android.application"
    id "kotlin-android"
    // Must be applied after Android and Kotlin plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.errorsmasher.es_viewer.es_viewer"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }
    defaultConfig {
        applicationId "com.errorsmasher.es_viewer.es_viewer"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    buildTypes {
        release {
            // Debug signing so release APK builds without a missing local keystore.
            // For Play Store, configure a release keystore via `key.properties` / signingConfigs.
            signingConfig signingConfigs.debug
        }
    }

}

flutter {
    source '../..'
}
